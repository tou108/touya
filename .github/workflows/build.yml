name: Build NXMacroAdvanced

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore NXMacroAdvanced/NXMacroAdvanced.csproj

    - name: Publish (Single File / Self-Contained)
      run: >
        dotnet publish NXMacroAdvanced/NXMacroAdvanced.csproj
        --configuration Release
        --runtime win-x64
        --self-contained true
        --no-restore
        -o publish

    # OpenCvSharpExtern.dll など native DLL も同梱するため zip でまとめる
    - name: Zip artifact
      run: Compress-Archive -Path publish\* -DestinationPath NXMacroAdvanced-win-x64.zip
      shell: pwsh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NXMacroAdvanced-win-x64
        path: NXMacroAdvanced-win-x64.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: NXMacroAdvanced-win-x64

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: NXMacroAdvanced-win-x64.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
